<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Genre Classifier</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: #2c3e50; text-align: center; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; color: #7f8c8d; }
        .chart-wrapper { margin-top: 30px; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 Music Genre Classifier</h1>
    <p>Paste song lyrics below to see the probability distribution across 7 genres.</p>
    
    <textarea id="lyricsInput" placeholder="Enter lyrics here..."></textarea>
    <button id="predictBtn" onclick="classifyGenre()">Analyze Lyrics</button>
    
    <div id="status"></div>

    <div class="chart-wrapper">
        <canvas id="genreChart"></canvas>
    </div>
</div>

<script>
    let genreChart = null;

    async function classifyGenre() {
        const lyrics = document.getElementById('lyricsInput').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('predictBtn');

        if (!lyrics.trim()) {
            alert("Please enter some lyrics first!");
            return;
        }

        // UI Feedback
        status.innerText = "Spark is processing... (this may take a few seconds)";
        btn.disabled = true;

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // Fixes the 415 error
                },
                body: JSON.stringify({ lyrics: lyrics })
            });

            if (!response.ok) throw new Error("Server Error: " + response.status);

            const data = await response.json();
            renderChart(data);
            status.innerText = "Analysis Complete!";
        } catch (error) {
            console.error(error);
            status.innerText = "Error: " + error.message;
        } finally {
            btn.disabled = false;
        }
    }

    function renderChart(data) {
        const ctx = document.getElementById('genreChart').getContext('2d');
        const labels = Object.keys(data);
        const values = Object.values(data);

        // Destroy old chart if it exists to refresh data
        if (genreChart) {
            genreChart.destroy();
        }

        genreChart = new Chart(ctx, {
            type: 'bar', // You can change this to 'pie' or 'doughnut'
            data: {
                labels: labels,
                datasets: [{
                    label: 'Confidence Level (0.0 - 1.0)',
                    data: values,
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.6)',
                        'rgba(54, 162, 235, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(153, 102, 255, 0.6)',
                        'rgba(255, 159, 64, 0.6)',
                        'rgba(199, 199, 199, 0.6)'
                    ],
                    borderColor: 'rgba(255, 255, 255, 1)',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 1 }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }
</script>

</body>
</html>
